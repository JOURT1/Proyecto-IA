# Dataset Configuration File for YOLO Training
# Formato: YOLO v8 compatible

path: /path/to/CADP  # root directory
train: images/train  # train images (relative to 'path')
val: images/val      # val images (relative to 'path')
test: images/test    # test images (relative to 'path')

# Number of classes
nc: 4

# Class names
names:
  0: car
  1: motorcycle
  2: bus
  3: truck

# Optional: Download link for automatic dataset download
# download: https://example.com/dataset.zip

# Notes:
# - Images should be in jpg/png format
# - Labels should be in YOLO format (class_id x_center y_center width height)
# - All coordinates are normalized (0-1)
# - Dataset should be split: 70% train, 15% val, 15% test
